name: CI

on:
  pull_request:
  push:
    branches: ['main']

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Release signing preflight
        if: runner.os == 'Linux'
        run: node scripts/check-signing-readiness.js --format json --no-write-summary

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native deps for Electron
        run: npx electron-builder install-app-deps

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Tests
        run: npm test

      - name: Audit (high severity)
        if: runner.os == 'Linux'
        run: npm audit --audit-level=high

      - name: Syntax checks
        run: |
          node --check scripts/check-signing-readiness.js
          node --check scripts/provision-signing-secrets.js
          node --check scripts/render-release-notes.js
          node --check scripts/smoke-packaged.js
          node --check src/main.js
          node --check src/main/appProtocol.js
          node --check src/main/botManager.js
          node --check src/main/paths.js
          node --check src/main/settings.js
          node --check src/main/smokeHarness.js
          node --check src/main/ui.js
          node --check src/main/updates.js
          node --check src/main/userData.js
          node --check src/preload.js
          node --check src/core/bot.js
          node --check src/renderer/app.js

      - name: Package (dir only)
        run: npm run build:linux:dir
        if: runner.os == 'Linux'
        env:
          ELECTRON_BUILDER_PUBLISH: never

      - name: Package (dir only)
        run: npm run build:win:dir
        if: runner.os == 'Windows'
        env:
          ELECTRON_BUILDER_PUBLISH: never

      - name: Package (dir only)
        run: npm run build:mac:dir
        if: runner.os == 'macOS'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_PUBLISH: never

      - name: Smoke packaged app (Linux)
        if: runner.os == 'Linux'
        run: npm run smoke:packaged

      - name: Smoke packaged app (Windows)
        if: runner.os == 'Windows'
        run: npm run smoke:packaged

      - name: Smoke packaged app (macOS)
        if: runner.os == 'macOS'
        run: npm run smoke:packaged
