name: Release (build + publish)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        shell: bash
        run: |
          node - <<'NODE' >> "$GITHUB_ENV"
          const { getReleaseChannelInfo } = require('./src/shared/releaseChannel');
          const tag = String(process.env.RELEASE_TAG || '').trim();
          if (!/^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/.test(tag)) {
            throw new Error(
              `Ref inválida para release: "${tag}". Execute o workflow a partir de uma tag semver.`
            );
          }
          const info = getReleaseChannelInfo(tag);
          console.log(`RELEASE_CHANNEL=${info.channel}`);
          console.log(`RELEASE_FEED_FILE=${info.feedFile}`);
          console.log(`RELEASE_IS_PRERELEASE=${info.isPrerelease ? 'true' : 'false'}`);
          NODE

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native deps for Electron
        run: npx electron-builder install-app-deps

      - name: Install rpm tooling (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Ensure GitHub Release exists (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          FLAGS=(--draft --title "${RELEASE_TAG}")
          if [[ "${RELEASE_IS_PRERELEASE}" == "true" ]]; then
            FLAGS+=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" "${FLAGS[@]}"
          else
            gh release create "${RELEASE_TAG}" "${FLAGS[@]}" --generate-notes
          fi

      - name: Build (Linux AppImage + deb)
        if: runner.os == 'Linux'
        run: npm run build:linux -- --publish always

      - name: Build (Linux rpm)
        if: runner.os == 'Linux'
        run: npm run build:linux:rpm -- --publish always

      - name: Upload RPM to GitHub Release
        if: runner.os == 'Linux'
        run: gh release upload "${RELEASE_TAG}" dist/*.rpm --clobber

      - name: Patch Linux feed with RPM entry
        if: runner.os == 'Linux'
        run: node scripts/patch-linux-feed-with-rpm.js dist "${RELEASE_FEED_FILE}"

      - name: Upload Linux feed
        if: runner.os == 'Linux'
        run: gh release upload "${RELEASE_TAG}" "dist/${RELEASE_FEED_FILE}" --clobber

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npm run build:win -- --publish always

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: npm run build:mac -- --publish always
