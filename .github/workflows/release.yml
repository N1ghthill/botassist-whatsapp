name: Release (build + publish)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release metadata
        shell: bash
        run: |
          node - <<'NODE' >> "$GITHUB_ENV"
          const { getReleaseChannelInfo } = require('./src/shared/releaseChannel');
          const tag = String(process.env.RELEASE_TAG || '').trim();
          if (!/^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/.test(tag)) {
            throw new Error(
              `Ref inválida para release: "${tag}". Execute o workflow a partir de uma tag semver.`
            );
          }
          const info = getReleaseChannelInfo(tag);
          console.log(`RELEASE_CHANNEL=${info.channel}`);
          console.log(`RELEASE_FEED_FILE=${info.feedFile}`);
          console.log(`RELEASE_IS_PRERELEASE=${info.isPrerelease ? 'true' : 'false'}`);
          console.log(`EP_PRE_RELEASE=${info.isPrerelease ? 'true' : 'false'}`);
          console.log('EP_DRAFT=false');
          NODE

      - name: Render release notes
        shell: bash
        run: |
          node scripts/render-release-notes.js --tag "${RELEASE_TAG}" --output release-notes.md
          echo "RELEASE_TITLE=$(node scripts/render-release-notes.js --tag "${RELEASE_TAG}" --title-only)" >> "$GITHUB_ENV"

      - name: Ensure GitHub Release exists
        shell: bash
        run: |
          CREATE_FLAGS=(--title "${RELEASE_TITLE}" --verify-tag --notes-file release-notes.md)
          EDIT_FLAGS=(--title "${RELEASE_TITLE}" --verify-tag --notes-file release-notes.md)

          if [[ "${RELEASE_IS_PRERELEASE}" == "true" ]]; then
            CREATE_FLAGS+=(--prerelease --latest=false)
            EDIT_FLAGS+=(--prerelease)
          else
            CREATE_FLAGS+=(--latest)
            EDIT_FLAGS+=(--latest)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" "${EDIT_FLAGS[@]}"
          else
            gh release create "${RELEASE_TAG}" "${CREATE_FLAGS[@]}"
          fi

  build-and-publish:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release metadata
        shell: bash
        run: |
          node - <<'NODE' >> "$GITHUB_ENV"
          const { getReleaseChannelInfo } = require('./src/shared/releaseChannel');
          const tag = String(process.env.RELEASE_TAG || '').trim();
          if (!/^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/.test(tag)) {
            throw new Error(
              `Ref inválida para release: "${tag}". Execute o workflow a partir de uma tag semver.`
            );
          }
          const info = getReleaseChannelInfo(tag);
          console.log(`RELEASE_CHANNEL=${info.channel}`);
          console.log(`RELEASE_FEED_FILE=${info.feedFile}`);
          console.log(`RELEASE_IS_PRERELEASE=${info.isPrerelease ? 'true' : 'false'}`);
          console.log(`EP_PRE_RELEASE=${info.isPrerelease ? 'true' : 'false'}`);
          console.log('EP_DRAFT=false');
          NODE

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native deps for Electron
        run: npx electron-builder install-app-deps

      - name: Install rpm tooling (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Resolve signing readiness
        shell: bash
        env:
          WINDOWS_CSC_LINK: ${{ secrets.WIN_CSC_LINK || secrets.CSC_LINK }}
          WINDOWS_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD || secrets.CSC_KEY_PASSWORD }}
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK || secrets.CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD || secrets.CSC_KEY_PASSWORD }}
          MAC_CSC_NAME: ${{ secrets.MAC_CSC_NAME || secrets.CSC_NAME }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          REQUIRE_SIGNED_RELEASES: ${{ vars.REQUIRE_SIGNED_RELEASES }}
        run: |
          windows_ready=false
          mac_sign_ready=false
          mac_notarization_ready=false

          export_env() {
            local key="$1"
            local value="$2"
            if [[ -z "${value}" ]]; then
              return 0
            fi
            {
              echo "${key}<<EOF"
              echo "${value}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          }

          if [[ -n "${WINDOWS_CSC_LINK}" && -n "${WINDOWS_CSC_KEY_PASSWORD}" ]]; then
            windows_ready=true
          fi

          if [[ -n "${MAC_CSC_LINK}" && -n "${MAC_CSC_KEY_PASSWORD}" ]]; then
            mac_sign_ready=true
          elif [[ -n "${MAC_CSC_NAME}" ]]; then
            mac_sign_ready=true
          fi

          if [[ -n "${APPLE_API_KEY}" && -n "${APPLE_API_KEY_ID}" && -n "${APPLE_API_ISSUER}" ]]; then
            mac_notarization_ready=true
          elif [[ -n "${APPLE_ID}" && -n "${APPLE_APP_SPECIFIC_PASSWORD}" && -n "${APPLE_TEAM_ID}" ]]; then
            mac_notarization_ready=true
          fi

          {
            echo "## Signing readiness"
            echo "- Windows signing: ${windows_ready}"
            echo "- macOS signing: ${mac_sign_ready}"
            echo "- macOS notarization: ${mac_notarization_ready}"
            echo "- Require signed releases: ${REQUIRE_SIGNED_RELEASES:-false}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            export_env CSC_LINK "${WINDOWS_CSC_LINK}"
            export_env CSC_KEY_PASSWORD "${WINDOWS_CSC_KEY_PASSWORD}"
          fi

          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            if [[ "${mac_sign_ready}" != "true" ]]; then
              echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            fi
            export_env CSC_LINK "${MAC_CSC_LINK}"
            export_env CSC_KEY_PASSWORD "${MAC_CSC_KEY_PASSWORD}"
            export_env CSC_NAME "${MAC_CSC_NAME}"
            export_env APPLE_API_KEY "${APPLE_API_KEY}"
            export_env APPLE_API_KEY_ID "${APPLE_API_KEY_ID}"
            export_env APPLE_API_ISSUER "${APPLE_API_ISSUER}"
            export_env APPLE_ID "${APPLE_ID}"
            export_env APPLE_APP_SPECIFIC_PASSWORD "${APPLE_APP_SPECIFIC_PASSWORD}"
            export_env APPLE_TEAM_ID "${APPLE_TEAM_ID}"
          fi

          if [[ "${REQUIRE_SIGNED_RELEASES}" == "true" ]]; then
            if [[ "${windows_ready}" != "true" ]]; then
              echo "Windows signing nao esta configurado." >&2
              exit 1
            fi
            if [[ "${mac_sign_ready}" != "true" ]]; then
              echo "macOS signing nao esta configurado." >&2
              exit 1
            fi
            if [[ "${mac_notarization_ready}" != "true" ]]; then
              echo "macOS notarization nao esta configurada." >&2
              exit 1
            fi
          fi

      - name: Build (Linux AppImage + deb)
        if: runner.os == 'Linux'
        run: npm run build:linux -- --publish always

      - name: Smoke packaged app (Linux)
        if: runner.os == 'Linux'
        run: npm run smoke:packaged

      - name: Build (Linux rpm)
        if: runner.os == 'Linux'
        run: npm run build:linux:rpm -- --publish always

      - name: Upload RPM to GitHub Release
        if: runner.os == 'Linux'
        run: gh release upload "${RELEASE_TAG}" dist/*.rpm --clobber

      - name: Patch Linux feed with RPM entry
        if: runner.os == 'Linux'
        run: node scripts/patch-linux-feed-with-rpm.js dist "${RELEASE_FEED_FILE}"

      - name: Upload Linux feed
        if: runner.os == 'Linux'
        run: gh release upload "${RELEASE_TAG}" "dist/${RELEASE_FEED_FILE}" --clobber

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npm run build:win -- --publish always

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: npm run build:mac -- --publish always

  verify-release:
    needs: build-and-publish
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Verify published release assets and feeds
        run: npm run release:verify -- --tag "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}"
