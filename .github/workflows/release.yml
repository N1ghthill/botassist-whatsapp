name: Release (build + publish)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve release metadata
        shell: bash
        run: |
          node - <<'NODE' >> "$GITHUB_ENV"
          const { getReleaseChannelInfo } = require('./src/shared/releaseChannel');
          const tag = String(process.env.RELEASE_TAG || '').trim();
          if (!/^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/.test(tag)) {
            throw new Error(
              `Ref inválida para release: "${tag}". Execute o workflow a partir de uma tag semver.`
            );
          }
          const info = getReleaseChannelInfo(tag);
          console.log(`RELEASE_CHANNEL=${info.channel}`);
          console.log(`RELEASE_FEED_FILE=${info.feedFile}`);
          console.log(`RELEASE_IS_PRERELEASE=${info.isPrerelease ? 'true' : 'false'}`);
          console.log(`EP_PRE_RELEASE=${info.isPrerelease ? 'true' : 'false'}`);
          console.log('EP_DRAFT=false');
          NODE

      - name: Render release notes
        shell: bash
        run: |
          node scripts/render-release-notes.js --tag "${RELEASE_TAG}" --output release-notes.md
          echo "RELEASE_TITLE=$(node scripts/render-release-notes.js --tag "${RELEASE_TAG}" --title-only)" >> "$GITHUB_ENV"

      - name: Ensure GitHub Release exists
        shell: bash
        run: |
          CREATE_FLAGS=(--title "${RELEASE_TITLE}" --verify-tag --notes-file release-notes.md)
          EDIT_FLAGS=(--title "${RELEASE_TITLE}" --verify-tag --notes-file release-notes.md)

          if [[ "${RELEASE_IS_PRERELEASE}" == "true" ]]; then
            CREATE_FLAGS+=(--prerelease --latest=false)
            EDIT_FLAGS+=(--prerelease)
          else
            CREATE_FLAGS+=(--latest)
            EDIT_FLAGS+=(--latest)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" "${EDIT_FLAGS[@]}"
          else
            gh release create "${RELEASE_TAG}" "${CREATE_FLAGS[@]}"
          fi

  build-and-publish:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve release metadata
        shell: bash
        run: |
          node - <<'NODE' >> "$GITHUB_ENV"
          const { getReleaseChannelInfo } = require('./src/shared/releaseChannel');
          const tag = String(process.env.RELEASE_TAG || '').trim();
          if (!/^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/.test(tag)) {
            throw new Error(
              `Ref inválida para release: "${tag}". Execute o workflow a partir de uma tag semver.`
            );
          }
          const info = getReleaseChannelInfo(tag);
          console.log(`RELEASE_CHANNEL=${info.channel}`);
          console.log(`RELEASE_FEED_FILE=${info.feedFile}`);
          console.log(`RELEASE_IS_PRERELEASE=${info.isPrerelease ? 'true' : 'false'}`);
          console.log(`EP_PRE_RELEASE=${info.isPrerelease ? 'true' : 'false'}`);
          console.log('EP_DRAFT=false');
          NODE

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Resolve signing readiness
        env:
          WINDOWS_CSC_LINK: ${{ secrets.WIN_CSC_LINK || secrets.CSC_LINK }}
          WINDOWS_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD || secrets.CSC_KEY_PASSWORD }}
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK || secrets.CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD || secrets.CSC_KEY_PASSWORD }}
          MAC_CSC_NAME: ${{ secrets.MAC_CSC_NAME || secrets.CSC_NAME }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          REQUIRE_SIGNED_RELEASES: ${{ vars.REQUIRE_SIGNED_RELEASES }}
        run: node scripts/check-signing-readiness.js

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native deps for Electron
        run: npx electron-builder install-app-deps

      - name: Install rpm tooling (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build (Linux AppImage + deb)
        if: runner.os == 'Linux'
        run: npm run build:linux -- --publish always

      - name: Smoke packaged app (Linux)
        if: runner.os == 'Linux'
        run: npm run smoke:packaged

      - name: Build (Linux rpm)
        if: runner.os == 'Linux'
        run: npm run build:linux:rpm -- --publish always

      - name: Upload RPM to GitHub Release
        if: runner.os == 'Linux'
        run: gh release upload "${RELEASE_TAG}" dist/*.rpm --clobber

      - name: Patch Linux feed with RPM entry
        if: runner.os == 'Linux'
        run: node scripts/patch-linux-feed-with-rpm.js dist "${RELEASE_FEED_FILE}"

      - name: Upload Linux feed
        if: runner.os == 'Linux'
        run: gh release upload "${RELEASE_TAG}" "dist/${RELEASE_FEED_FILE}" --clobber

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npm run build:win -- --publish always

      - name: Smoke packaged app (Windows)
        if: runner.os == 'Windows'
        run: npm run smoke:packaged

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: npm run build:mac -- --publish always

      - name: Smoke packaged app (macOS)
        if: runner.os == 'macOS'
        run: npm run smoke:packaged

  verify-release:
    needs: build-and-publish
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22

      - name: Render release manifest
        run: node scripts/render-release-manifest.js --tag "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --include-assets --output release-manifest.json

      - name: Upload release manifest
        run: gh release upload "${RELEASE_TAG}" release-manifest.json --clobber

      - name: Verify published release assets and feeds
        run: npm run release:verify -- --tag "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}"
